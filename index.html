<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SQL Generator</title>
<style>
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#22263a;--bd:#2e3350;
  --ac:#6c8af7;--dn:#f87171;--ok:#34d399;--tx:#e2e8f0;--mt:#8892b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:16px 32px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.4rem;font-weight:700}
.badge{font-size:.75rem;background:var(--ac);color:#fff;padding:2px 8px;border-radius:99px;font-weight:600}
.wrap{max-width:1400px;margin:0 auto;padding:32px 20px;display:flex;flex-direction:column;gap:24px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:24px}
.lbl{font-size:.78rem;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
input[type=text],select{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;color:var(--tx);font-size:.9rem;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus,select:focus{border-color:var(--ac)}
input:disabled,select:disabled{opacity:.25;cursor:not-allowed}
input.bad{border-color:var(--dn)!important}
.errtip{font-size:.7rem;color:var(--dn);margin-top:2px;min-height:14px}
.btn{border:none;border-radius:6px;padding:8px 16px;font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.8}
.bp{background:var(--ac);color:#fff}
.bg{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bd2{background:transparent;border:1px solid var(--dn);color:var(--dn);padding:5px 10px;font-size:.8rem}
.bc{background:var(--s2);border:1px solid var(--bd);color:var(--ac);padding:6px 14px;font-size:.82rem}
.bc.ok{background:var(--ok);color:#0f1117;border-color:var(--ok)}
/* col grid: name | type | size | default | on update | PK | NN | UQ | FK | del */
.cg{display:grid;grid-template-columns:1.4fr 1.5fr .8fr 1.2fr 1.4fr 2.6rem 2.6rem 2.6rem 2.6rem 2rem;gap:7px;align-items:start;margin-top:8px}
.ch{font-size:.72rem;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.cc{text-align:center}
.cbw{display:flex;justify-content:center;padding-top:10px}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--ac);cursor:pointer}
.tlist{display:flex;flex-direction:column;gap:20px}
.empty{text-align:center;padding:36px;color:var(--mt)}
.tabs{display:flex;gap:8px}
.tab{padding:7px 18px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--mt);transition:all .15s}
.tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.outwrap{position:relative;margin-top:14px}
pre{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:20px 70px 20px 20px;font-size:.9rem;line-height:1.9;overflow-x:auto;white-space:pre;color:#a9c5e8;min-height:100px;font-family:'Fira Code','Consolas',monospace}
.outact{position:absolute;top:10px;right:12px}
.fkpanel{margin-top:6px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;display:flex;flex-direction:column;gap:7px;grid-column:1/-1}
.fkrow{display:flex;gap:6px;align-items:center}
.fkrow label{font-size:.75rem;color:var(--mt);white-space:nowrap;min-width:80px}
.kw{color:#c792ea;font-weight:700}.ty{color:#f78c6c}.cm{color:#546e7a;font-style:italic}.st{color:#c3e88d}
</style>
</head>
<body>
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="5" width="18" height="3" rx="1.5" fill="#6c8af7"/>
    <rect x="3" y="10.5" width="18" height="3" rx="1.5" fill="#a78bfa"/>
    <rect x="3" y="16" width="18" height="3" rx="1.5" fill="#34d399"/>
  </svg>
  <h1>SQL Generator</h1>
  <span class="badge">GitHub Pages</span>
</header>

<div class="wrap">
  <div class="card">
    <span class="lbl">Database Name</span>
    <input type="text" id="dbName" placeholder="my_database" style="max-width:360px" oninput="renderSQL()">
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:1.05rem;font-weight:700">Tables</span>
      <button class="btn bp" onclick="addTable()">+ Add Table</button>
    </div>
    <div class="tlist" id="tlist"><div class="empty">Add a table to get started &#x1F446;</div></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:1.05rem;font-weight:700">Generated SQL</span>
      <div class="tabs">
        <button class="tab on" id="tab-mysql" onclick="switchTab('mysql')">MySQL</button>
        <button class="tab" id="tab-pg" onclick="switchTab('pg')">PostgreSQL</button>
      </div>
    </div>
    <div class="outwrap">
      <pre id="sqlout"><span class="cm">-- Add tables and columns to generate SQL</span></pre>
      <div class="outact"><button class="btn bc" id="copybtn" onclick="copySQL()">&#x1F4CB; Copy</button></div>
    </div>
  </div>
</div>

<script>
const TYPES=[
  {v:'TINYINT',   lb:'TINYINT',                  x:0},
  {v:'SMALLINT',  lb:'SMALLINT',                 x:0},
  {v:'MEDIUMINT', lb:'MEDIUMINT',                x:0},
  {v:'INT',       lb:'INT',                      x:0},
  {v:'BIGINT',    lb:'BIGINT',                   x:0},
  {v:'SERIAL',    lb:'SERIAL / AUTO_INCREMENT',  x:0},
  {v:'FLOAT',     lb:'FLOAT',                    x:0},
  {v:'DOUBLE',    lb:'DOUBLE / REAL',             x:0},
  {v:'DECIMAL',   lb:'DECIMAL(p,s)',              x:1, ph:'10,2',    mv:[65,30]},
  {v:'CHAR',      lb:'CHAR(n)',                   x:1, ph:'10',      mv:255},
  {v:'VARCHAR',   lb:'VARCHAR(n)',                x:1, ph:'255',     mv:65535},
  {v:'TINYTEXT',  lb:'TINYTEXT',                 x:0},
  {v:'TEXT',      lb:'TEXT',                     x:0},
  {v:'MEDIUMTEXT',lb:'MEDIUMTEXT',               x:0},
  {v:'LONGTEXT',  lb:'LONGTEXT',                 x:0},
  {v:'BINARY',    lb:'BINARY(n)',                 x:1, ph:'16',      mv:255},
  {v:'VARBINARY', lb:'VARBINARY(n)',              x:1, ph:'255',     mv:65535},
  {v:'TINYBLOB',  lb:'TINYBLOB',                 x:0},
  {v:'BLOB',      lb:'BLOB',                     x:0},
  {v:'MEDIUMBLOB',lb:'MEDIUMBLOB',               x:0},
  {v:'LONGBLOB',  lb:'LONGBLOB',                 x:0},
  {v:'BIT',       lb:'BIT(n)',                    x:1, ph:'1',       mv:64},
  {v:'DATE',      lb:'DATE',                     x:0},
  {v:'TIME',      lb:'TIME',                     x:0},
  {v:'YEAR',      lb:'YEAR',                     x:0},
  {v:'DATETIME',  lb:'DATETIME',                 x:0},
  {v:'TIMESTAMP', lb:'TIMESTAMP',                x:0},
  {v:'BOOLEAN',   lb:'BOOLEAN / TINYINT(1)',      x:0},
  {v:'JSON',      lb:'JSON',                     x:0},
  {v:'UUID',      lb:'UUID / VARCHAR(36)',        x:0},
  {v:'ENUM',      lb:'ENUM(...)',                 x:1, ph:"'v1','v2'"},
  {v:'SET',       lb:'SET(...)',                  x:1, ph:"'a','b'"},
];
const DFLTS=[
  {v:'',lb:'(none)'},{v:'CURRENT_TIMESTAMP',lb:'CURRENT_TIMESTAMP'},
  {v:'NOW()',lb:'NOW()'},{v:'0',lb:'0'},{v:'1',lb:'1'},
  {v:"''",lb:"'' (empty string)"},{v:'NULL',lb:'NULL'},
  {v:'TRUE',lb:'TRUE'},{v:'FALSE',lb:'FALSE'},{v:'__c__',lb:'Custom...'},
];
const ON_UPDATE_OPTS=[
  {v:'',lb:'(none)'},
  {v:'CURRENT_TIMESTAMP',lb:'CURRENT_TIMESTAMP'},
  {v:'NOW()',lb:'NOW()'},
  {v:'__c__',lb:'Custom...'},
];
const FKACT=['NO ACTION','RESTRICT','CASCADE','SET NULL','SET DEFAULT'];

let tables=[], dialect='mysql', _t=0, _c=0;

function uid(){return ++_t}
function cid(){return ++_c}
function newCol(){return{id:cid(),name:'',type:'VARCHAR',extra:'255',dflt:'',dc:'',ou:'',ouc:'',pk:false,nn:false,uq:false,fk:false,ft:'',fc:'',fd:'CASCADE'}}
function td(v){return TYPES.find(t=>t.v===v)||{}}

function addTable(){
  tables.push({id:uid(),name:'',columns:[]});
  redraw();
}
function delTable(id){
  tables=tables.filter(t=>t.id!==id);
  redraw();
}
function addCol(tid){
  const t=tables.find(t=>t.id===tid);
  if(t){t.columns.push(newCol());redraw();}
}
function delCol(tid,cid){
  const t=tables.find(t=>t.id===tid);
  if(t){t.columns=t.columns.filter(c=>c.id!==cid);redraw();}
}

function sync(){
  tables.forEach(t=>{
    const card=document.querySelector(`[data-tid="${t.id}"]`);
    if(!card)return;
    const ni=card.querySelector('.tblname');
    if(ni)t.name=ni.value;
    t.columns.forEach(col=>{
      const row=card.querySelector(`[data-cid="${col.id}"]`);
      if(!row)return;
      const n=row.querySelector('.cn'); if(n)col.name=n.value;
      const tp=row.querySelector('.ct'); if(tp)col.type=tp.value;
      const ex=row.querySelector('.cx'); if(ex)col.extra=ex.value;
      const df=row.querySelector('.cd'); if(df)col.dflt=df.value;
      const dc=row.querySelector('.cdc');if(dc)col.dc=dc.value;
      const ou=row.querySelector('.ou'); if(ou)col.ou=ou.value;
      const ouc=row.querySelector('.ouc');if(ouc)col.ouc=ouc.value;
      const pk=row.querySelector('.pk'); if(pk)col.pk=pk.checked;
      const nn=row.querySelector('.nn'); if(nn)col.nn=nn.checked;
      const uq=row.querySelector('.uq'); if(uq)col.uq=uq.checked;
      const fk=row.querySelector('.fk'); if(fk)col.fk=fk.checked;
      const ft=row.querySelector('.ft'); if(ft)col.ft=ft.value;
      const fc=row.querySelector('.fc'); if(fc)col.fc=fc.value;
      const fd=row.querySelector('.fd'); if(fd)col.fd=fd.value;
    });
  });
}

function validate(type,raw){
  const t=td(type);
  if(!t.x||!t.mv)return{ok:true};
  if(type==='DECIMAL'){
    const p=raw.split(',').map(s=>s.trim());
    if(p.length!==2)return{ok:false,msg:'Format: p,s (e.g. 10,2)'};
    const[a,b]=p.map(Number);
    if(isNaN(a)||isNaN(b))return{ok:false,msg:'Numbers only'};
    if(a>t.mv[0])return{ok:false,msg:`precision max ${t.mv[0]}`};
    if(b>t.mv[1])return{ok:false,msg:`scale max ${t.mv[1]}`};
    if(b>a)return{ok:false,msg:'scale \u2264 precision'};
    return{ok:true};
  }
  const n=Number(raw);
  if(!raw||isNaN(n)||n<1)return{ok:false,msg:'Enter a number \u2265 1'};
  if(n>t.mv)return{ok:false,msg:`Max ${t.mv.toLocaleString()}`};
  return{ok:true};
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function selOpts(arr,valFn,lbFn,cur){
  return arr.map(x=>`<option value="${esc(valFn(x))}"${cur===valFn(x)?' selected':''}>${esc(lbFn(x))}</option>`).join('');
}

function redraw(){
  const list=document.getElementById('tlist');
  if(!tables.length){list.innerHTML='<div class="empty">Add a table to get started &#x1F446;</div>';renderSQL();return;}

  list.innerHTML=tables.map(t=>{
    const colRows=t.columns.map(col=>{
      const tp=td(col.type);
      const hasX=!!tp.x;
      const isC=col.dflt==='__c__';
      const isOUC=col.ou==='__c__';
      const vld=hasX?validate(col.type,col.extra||''):{ok:true};
      const otherT=tables.filter(o=>o.id!==t.id);
      const refT=tables.find(o=>String(o.id)===String(col.ft));

      return `<div class="cg" data-cid="${col.id}">
  <div><input type="text" class="cn" value="${esc(col.name)}" placeholder="column_name" oninput="onInput()"></div>
  <div><select class="ct" onchange="onTypeChange(${t.id},${col.id},this.value)">${selOpts(TYPES,x=>x.v,x=>x.lb,col.type)}</select></div>
  <div>
    <input type="text" class="cx${!vld.ok?' bad':''}" value="${esc(col.extra||'')}" placeholder="${hasX?esc(tp.ph||''):'\u2014'}" ${hasX?'':'disabled'} oninput="onExtraInput(${t.id},${col.id},this)">
    <div class="errtip">${vld.ok?'':esc(vld.msg)}</div>
  </div>
  <div style="display:flex;gap:4px">
    <select class="cd" style="flex:1" onchange="onInput()">${selOpts(DFLTS,x=>x.v,x=>x.lb,col.dflt)}</select>
    <input type="text" class="cdc" value="${esc(col.dc||'')}" placeholder="value" style="width:72px;${isC?'':'display:none'}" oninput="onInput()">
  </div>
  <div style="display:flex;gap:4px">
    <select class="ou" style="flex:1" onchange="onInput()">${selOpts(ON_UPDATE_OPTS,x=>x.v,x=>x.lb,col.ou)}</select>
    <input type="text" class="ouc" value="${esc(col.ouc||'')}" placeholder="value" style="width:72px;${isOUC?'':'display:none'}" oninput="onInput()">
  </div>
  <div class="cbw"><input type="checkbox" class="pk" ${col.pk?'checked':''} onchange="onInput()"></div>
  <div class="cbw"><input type="checkbox" class="nn" ${col.nn?'checked':''} onchange="onInput()"></div>
  <div class="cbw"><input type="checkbox" class="uq" ${col.uq?'checked':''} onchange="onInput()"></div>
  <div class="cbw"><input type="checkbox" class="fk" ${col.fk?'checked':''} onchange="onFKToggle(${t.id},${col.id},this.checked)"></div>
  <button class="btn bd2" style="margin-top:8px;padding:4px 7px" onclick="delCol(${t.id},${col.id})">&times;</button>
  ${col.fk?`<div class="fkpanel">
    <div class="fkrow"><label>Ref. Table</label>
      <select class="ft" style="flex:1" onchange="onFKTable(${t.id},${col.id},this.value)">
        <option value="">-- Select table --</option>
        ${otherT.map(o=>`<option value="${o.id}"${String(col.ft)===String(o.id)?' selected':''}>${esc(o.name||'table_'+o.id)}</option>`).join('')}
      </select></div>
    <div class="fkrow"><label>Ref. Column</label>
      <select class="fc" style="flex:1" onchange="onInput()">
        <option value="">-- Select column --</option>
        ${refT?refT.columns.map(rc=>`<option value="${esc(rc.name)}"${col.fc===rc.name?' selected':''}>${esc(rc.name||'col_'+rc.id)}</option>`).join(''):''}
      </select></div>
    <div class="fkrow"><label>ON DELETE</label>
      <select class="fd" style="flex:1" onchange="onInput()">${FKACT.map(a=>`<option value="${a}"${col.fd===a?' selected':''}>${a}</option>`).join('')}</select></div>
  </div>`:''}
</div>`;
    }).join('');

    return `<div class="card" style="background:var(--s2)" data-tid="${t.id}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="5" rx="1" fill="#6c8af7"/><rect x="3" y="10" width="18" height="5" rx="1" fill="#a78bfa" opacity=".7"/><rect x="3" y="17" width="18" height="4" rx="1" fill="#34d399" opacity=".5"/></svg>
      <input type="text" class="tblname" value="${esc(t.name)}" placeholder="table_name"
        style="background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:1rem;font-weight:700;width:220px;outline:none"
        oninput="onInput()">
    </div>
    <button class="btn bd2" onclick="delTable(${t.id})">&times; Remove</button>
  </div>
  <div class="cg" style="margin-bottom:4px">
    <div class="ch">Column Name</div><div class="ch">Type</div><div class="ch">Size / Value</div>
    <div class="ch">Default</div>
    <div class="ch">ON UPDATE</div>
    <div class="ch cc" title="Primary Key">PK</div>
    <div class="ch cc" title="NOT NULL">NN</div>
    <div class="ch cc" title="UNIQUE">UQ</div>
    <div class="ch cc" title="Foreign Key">FK</div>
    <div></div>
  </div>
  ${colRows}
  <div style="margin-top:12px">
    <button class="btn bg" style="font-size:.82rem;padding:7px 14px" onclick="addCol(${t.id})">+ Add Column</button>
  </div>
</div>`;
  }).join('');

  renderSQL();
}

function onInput(){sync();renderSQL();}

function onTypeChange(tid,cid,val){
  sync();
  const t=tables.find(t=>t.id===tid);
  if(!t)return;
  const col=t.columns.find(c=>c.id===cid);
  if(!col)return;
  col.type=val;
  const tp=td(val);
  col.extra=tp.x?(tp.ph||''):'';
  redraw();
}

function onExtraInput(tid,cid,el){
  sync();
  const t=tables.find(t=>t.id===tid);
  if(!t)return;
  const col=t.columns.find(c=>c.id===cid);
  if(!col)return;
  col.extra=el.value;
  const vld=validate(col.type,col.extra);
  el.classList.toggle('bad',!vld.ok);
  const err=el.closest('[data-cid]').querySelector('.errtip');
  if(err)err.textContent=vld.ok?'':vld.msg;
  renderSQL();
}

function onFKToggle(tid,cid,on){
  sync();
  const t=tables.find(t=>t.id===tid);
  if(!t)return;
  const col=t.columns.find(c=>c.id===cid);
  if(!col)return;
  col.fk=on;
  redraw();
}

function onFKTable(tid,cid,val){
  sync();
  const t=tables.find(t=>t.id===tid);
  if(!t)return;
  const col=t.columns.find(c=>c.id===cid);
  if(!col)return;
  col.ft=val; col.fc='';
  redraw();
}

function switchTab(tab){
  dialect=tab;
  document.getElementById('tab-mysql').classList.toggle('on',tab==='mysql');
  document.getElementById('tab-pg').classList.toggle('on',tab==='pg');
  renderSQL();
}

function copySQL(){
  const sql=buildSQL();
  if(!sql)return;
  navigator.clipboard.writeText(sql).then(()=>{
    const b=document.getElementById('copybtn');
    b.textContent='\u2705 Copied!'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='\uD83D\uDCCB Copy';b.classList.remove('ok');},1800);
  });
}

function rtype(col,dl){
  const tp=col.type,ex=(col.extra||'').trim();
  if(dl==='mysql'){
    if(tp==='SERIAL')return 'INT AUTO_INCREMENT';
    if(tp==='BOOLEAN')return 'TINYINT(1)';
    if(tp==='UUID')return 'VARCHAR(36)';
    if(tp==='DOUBLE')return 'DOUBLE';
    if(['VARCHAR','CHAR','BINARY','VARBINARY','BIT'].includes(tp)&&ex)return `${tp}(${ex})`;
    if(tp==='DECIMAL'&&ex)return `DECIMAL(${ex})`;
    if(tp==='ENUM'&&ex)return `ENUM(${ex})`;
    if(tp==='SET'&&ex)return `SET(${ex})`;
    return tp;
  }else{
    if(tp==='SERIAL')return 'SERIAL';
    if(tp==='BOOLEAN')return 'BOOLEAN';
    if(tp==='UUID')return 'UUID';
    if(tp==='DATETIME')return 'TIMESTAMP';
    if(['LONGTEXT','MEDIUMTEXT','TINYTEXT'].includes(tp))return 'TEXT';
    if(tp==='TINYINT')return 'SMALLINT';
    if(tp==='MEDIUMINT')return 'INTEGER';
    if(tp==='DOUBLE')return 'DOUBLE PRECISION';
    if(['BLOB','TINYBLOB','MEDIUMBLOB','LONGBLOB','BINARY','VARBINARY'].includes(tp))return 'BYTEA';
    if(tp==='YEAR')return 'SMALLINT';
    if(tp==='ENUM'&&ex)return `VARCHAR(100) CHECK (${col.name||'col'} IN (${ex}))`;
    if(tp==='SET'&&ex)return `TEXT CHECK (${col.name||'col'} IN (${ex}))`;
    if(['VARCHAR','CHAR'].includes(tp)&&ex)return `${tp}(${ex})`;
    if(tp==='DECIMAL'&&ex)return `NUMERIC(${ex})`;
    if(tp==='BIT'&&ex)return `BIT(${ex})`;
    return tp;
  }
}

function buildSQL(){
  sync();
  const db=document.getElementById('dbName').value.trim();
  const vt=tables.filter(t=>t.columns.length>0);
  if(!vt.length)return '';
  const lines=[];
  if(db){
    lines.push(dialect==='mysql'?`USE ${db};`:`\\c ${db}`);
    lines.push('');
  }
  vt.forEach((t,ti)=>{
    const tn=t.name||`table_${ti+1}`;
    lines.push(`CREATE TABLE ${tn} (`);
    const defs=t.columns.map((col,ci)=>{
      const nm=col.name||`col_${ci+1}`;
      let l=`    ${nm} ${rtype(col,dialect)}`;
      if(col.nn)l+=' NOT NULL';
      if(col.uq)l+=' UNIQUE';
      const d=col.dflt==='__c__'?col.dc:col.dflt;
      if(d)l+=` DEFAULT ${d}`;
      // ON UPDATE (MySQL only — PostgreSQL doesn't support inline ON UPDATE)
      if(dialect==='mysql'&&col.ou){
        const ouVal=col.ou==='__c__'?col.ouc:col.ou;
        if(ouVal)l+=` ON UPDATE ${ouVal}`;
      }
      if(col.pk)l+=' PRIMARY KEY';
      return l;
    });
    const fks=t.columns
      .filter(c=>c.fk&&c.ft&&c.fc)
      .map(c=>{
        const rt=tables.find(o=>String(o.id)===String(c.ft));
        const rn=rt?(rt.name||`table_${rt.id}`):c.ft;
        return `    FOREIGN KEY (${c.name||`col_${c.id}`}) REFERENCES ${rn} (${c.fc}) ON DELETE ${c.fd}`;
      });
    const all=[...defs,...fks];
    lines.push(all.map((l,i)=>i<all.length-1?l+',':l).join('\n'));
    lines.push(');');
    if(ti<vt.length-1)lines.push('');
  });
  return lines.join('\n');
}

function renderSQL(){
  const sql=buildSQL();
  const pre=document.getElementById('sqlout');
  if(!sql){pre.innerHTML='<span class="cm">-- Add tables and columns to generate SQL</span>';return;}
  pre.innerHTML=hl(sql);
}

const KWS=['CREATE','TABLE','USE','PRIMARY','KEY','NOT','NULL','DEFAULT','AUTO_INCREMENT',
  'SERIAL','UNIQUE','CHECK','IN','REFERENCES','FOREIGN','ON','DELETE','UPDATE','CASCADE',
  'RESTRICT','SET','NO','ACTION','CONSTRAINT'];
const TYS=[
  'DOUBLE PRECISION','AUTO_INCREMENT',
  'TINYINT','SMALLINT','MEDIUMINT','INT','BIGINT','FLOAT','DOUBLE','DECIMAL','NUMERIC',
  'TINYTEXT','TEXT','MEDIUMTEXT','LONGTEXT','TINYBLOB','BLOB','MEDIUMBLOB','LONGBLOB',
  'BINARY','VARBINARY','VARCHAR','CHAR','BIT',
  'BOOLEAN','DATE','DATETIME','TIMESTAMP','TIME','YEAR',
  'JSON','UUID','BYTEA','ENUM','SET','SERIAL',
];
function hl(sql){
  let h=sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/('(?:[^'\\]|\\.)*')/g,'<span class="st">$1</span>');
  h=h.replace(/(--[^\n]*)/g,'<span class="cm">$1</span>');
  TYS.slice().sort((a,b)=>b.length-a.length).forEach(t=>{
    h=h.replace(new RegExp(`(?<![\\w>])(${t})(?![\\w<])`,'g'),'<span class="ty">$1</span>');
  });
  KWS.forEach(k=>{
    h=h.replace(new RegExp(`(?<![\\w>])(${k})(?![\\w<])`,'g'),'<span class="kw">$1</span>');
  });
  return h;
}

renderSQL();
</script>
